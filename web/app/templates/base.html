<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackWealth — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="layout">

        <!-- ─── SIDEBAR ─── -->
        {% include 'partials/sidebar.html' %}

        <!-- ─── MAIN ─── -->
        <main class="main">
{% block content %}{% endblock %}
        </main>

    </div><!-- end layout -->

    <!-- ── CATEGORY MODAL ── -->
    <div class="fs-overlay" id="cat-ov" onclick="if(event.target==this) closeCatModal()">
        <div class="fs-box" style="max-width:600px">
            <button class="fs-close" onclick="closeCatModal()">×</button>
            <div class="fs-title">Gestionar Categorías</div>
            <div style="display:flex;gap:12px;margin-bottom:24px">
                <input type="text" id="new-cat-name" placeholder="Nueva Categoría…" class="form-input" style="flex:1">
                <button class="btn-action btn-primary" onclick="addCategory()">Añadir</button>
            </div>
            <div id="cat-list" style="display:flex;flex-direction:column;gap:14px;max-height:480px;overflow-y:auto">
            </div>
        </div>
    </div>

    <!-- ── ASSET MANAGER MODAL ── -->
    <div id="modal-manage" class="modal-ov" onclick="if(event.target===this) closeAssetManager()">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <h3 style="font-size:17px;font-weight:700;margin-bottom:3px">Gestionar Activos</h3>
                    <p style="font-size:12px;color:var(--text-3)">Configura activos manuales o automáticos</p>
                </div>
                <button class="btn-action" onclick="closeAssetManager()"
                    style="width:34px;height:34px;justify-content:center;font-size:18px">×</button>
            </div>
            <div class="tab-nav">
                <button class="tab-btn active" id="tab-btn-list" onclick="switchTab('list')">Mis Activos</button>
                <button class="tab-btn" id="tab-btn-add" onclick="switchTab('add')">Añadir Nuevo</button>
            </div>
            <div class="modal-body">
                <div id="tab-list" class="tab-content">
                    <div class="sub-nav" id="sub-nav-list"></div>
                    <div id="asset-configs-list" class="config-list"></div>
                </div>
                <div id="tab-add" class="tab-content" style="display:none">
                    <div class="subtype-selector">
                        <button class="pill active" id="sub-btn-cash" onclick="setSubtype('cash')">Efectivo</button>
                        <button class="pill" id="sub-btn-market" onclick="setSubtype('market')">Mercado</button>
                        <button class="pill" id="sub-btn-indexa" onclick="setSubtype('indexa')">Indexa</button>
                    </div>
                    <form id="asset-form" onsubmit="event.preventDefault();saveAsset()">
                        <input type="hidden" id="asset-id">
                        <input type="hidden" id="asset-subtype" value="cash">
                        <div id="market-fields" style="display:none">
                            <div class="form-group" style="position:relative">
                                <label class="form-label">Buscar Activo</label>
                                <input type="text" id="asset-search" class="form-input"
                                    placeholder="Ej: Apple, Bitcoin…" oninput="onSearchInput(this.value)">
                                <div id="search-results" class="search-results"></div>
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group"><label class="form-label">Nombre</label><input type="text"
                                    id="asset-name" class="form-input" required></div>
                            <div class="form-group"><label class="form-label">Categoría</label>
                                <select id="asset-portfolio" class="form-input">
                                    <option value="CASH">Efectivo / Bancos</option>
                                    <option value="ETFS">ETFs</option>
                                    <option value="FUNDS">Fondos</option>
                                    <option value="CRYPTO">Criptomonedas</option>
                                    <option value="OTROS">Otros</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" id="ticker-group" style="display:none"><label
                                class="form-label">Ticker</label><input type="text" id="asset-ticker"
                                class="form-input"></div>
                        <div id="indexa-fields" style="display:none">
                            <div class="form-group"><label class="form-label">API Token</label><input type="password"
                                    id="indexa-token" class="form-input"></div>
                            <div class="form-group"><label class="form-label">Modo Sincronización</label><select
                                    id="asset-type" class="form-input">
                                    <option value="manual">Manual</option>
                                    <option value="auto">API</option>
                                </select></div>
                        </div>
                        <div id="cash-fields" style="display:none">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">Integración Cuentas</label>
                                    <select id="cash-sync-mode" class="form-input" onchange="toggleCashSync()">
                                        <option value="manual">Sin vinculación (Manual)</option>
                                        <option value="auto">Sincronizar extractos bancarios</option>
                                    </select>
                                </div>
                                <div class="form-group" id="cash-bank-group" style="display:none">
                                    <label class="form-label">CSV Source</label>
                                    <select id="cash-bank-source" class="form-input">
                                        <option value="SANTANDER">Santander</option>
                                        <option value="REVOLUT">Revolut</option>
                                        <option value="EDENRED">Edenred</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label" id="holdings-label">Saldo Total (€)</label>
                                <input type="number" id="asset-holdings" step="any" class="form-input" required>
                                <p id="holdings-hint" style="font-size:10px;color:var(--text-3);margin-top:4px">
                                    Introduce el valor total actual.</p>
                            </div>
                            <div class="form-group" id="invested-group">
                                <label class="form-label">Total Invertido (€)</label>
                                <input type="number" id="asset-invested" step="any" class="form-input" required>
                            </div>
                        </div>
                        <div style="display:flex;gap:12px;margin-top:16px">
                            <button type="button" class="btn-action" onclick="switchTab('list')"
                                style="flex:1;justify-content:center;height:44px">Cancelar</button>
                            <button type="submit" class="btn-action btn-primary" id="btn-save-asset"
                                style="flex:2;justify-content:center;height:44px">Guardar Activo</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCD0-0hj4PagQthwBlo_5RcMXhYHjag0xs",
          authDomain: "wealthtracker-d2a0d.firebaseapp.com",
          projectId: "wealthtracker-d2a0d",
          storageBucket: "wealthtracker-d2a0d.firebasestorage.app",
          messagingSenderId: "522194848214",
          appId: "1:522194848214:web:e6592a18c7b3b06365fc77",
          measurementId: "G-41GWKKRN5D"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Proteger ruta /app (Dashboard)
        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = '/';
            }
        });
        
        async function logout() {
            await auth.signOut();
            window.location.href = '/';
        }
    </script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>

</html>
